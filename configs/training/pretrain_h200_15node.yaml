image_size: 448
action_horizon: 64

# Optimization — aligned with RDT-1B
batch_size: 64
grad_accumulation_steps: 1
learning_rate: 1e-4
weight_decay: 0.01
warmup_steps: 10000
max_steps: 500000
grad_clip: 1.0

# Drifting Loss (paper Table 8)
loss_type: 'hybrid'
drift_weight: 0.001
temperatures: [0.02, 0.05, 0.2]
n_pos_samples: 128
n_neg_samples: 64
neg_queue_size: 16384
pos_queue_size: 8192
normalize_features: true
normalize_drift: true

# EMA
ema_decay: 0.9999

# AMP
use_amp: true
amp_dtype: 'bfloat16'

# DataLoader
num_workers: 16
image_aug: true
cond_mask_prob: 0.1

# Logging
log_every: 100
eval_every: 2000
save_every: 5000

# WandB
wandb_mode: 'online'
wandb_project: 'drifting-vla-pretrain'
