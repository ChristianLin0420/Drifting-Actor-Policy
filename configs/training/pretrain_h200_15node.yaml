# =============================================================================
# 15-Node H200 Pretraining Configuration
# =============================================================================
# 15 nodes × 8 H200 GPUs = 120 GPUs
# Global batch: 64/gpu × 1 accum × 120 GPUs = 7,680
#
# Aligned with RDT-1B pretrain.sh settings:
#   batch=64, lr=1e-4, constant schedule, AdamW(0.9, 0.999), grad_clip=1.0
# Drifting loss aligned with paper Table 8:
#   N_pos=128, N_neg=64, τ={0.02,0.05,0.2}
#
# Launch:
#   torchrun --nnodes=15 --nproc_per_node=8 \
#     --rdzv_id=drifting_pretrain --rdzv_backend=c10d \
#     --rdzv_endpoint=$MASTER_ADDR:$MASTER_PORT \
#     scripts/train.py \
#     --config configs/training/pretrain_h200_15node.yaml

# Model
model_size: 'base'
vlm: 'qwen3vl'
vlm_mode: 'lora'
lora_r: 16
vlm_lr_scale: 0.1

# Data — 110 datasets across 7 embodiment types (11 original + 50 Behavior1K + 10 OXE batch1 + 14 ALOHA static + 6 ALOHA mobile + 19 OXE batch2)
datasets:
